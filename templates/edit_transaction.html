{% extends "base.html" %}

{% block title %}
Edit Transaction | Budget Binder
{% endblock %}

{% block content %}

<div class="container">

    <header class="app-header">

        <div>

            <a href="/category/{{ transaction.category_id }}" style="font-size:15px;">
                ← Back to Category
            </a>

            <h1 class="page-title">
                Edit Transaction
            </h1>

            <p class="page-subtitle">
                Update the details of this transaction.
            </p>

        </div>

    </header>

    <form action="/edit-transaction/{{ transaction.id }}" method="POST">

        <h2 style="font-family:'Cormorant Garamond',serif; margin-bottom:25px; font-size:40px;">
            Edit Transaction
        </h2>

        <label>Date</label>
        <input
            type="date"
            name="date"
            value="{{ transaction.date }}"
            required>

        <label>Description</label>
        <input
            type="text"
            name="description"
            value="{{ transaction.description }}"
            required>

        <label>Amount</label>
        <input
            type="number"
            step="0.01"
            name="amount"
            value="{{ transaction.amount }}"
            required>

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

{% endblock %}
