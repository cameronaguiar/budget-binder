{% extends "base.html" %}

{% block title %}
Edit Category | Budget Binder
{% endblock %}

{% block content %}

<div class="container">

    <header class="app-header">

        <div>

            <a href="/manage-categories/{{ account.id }}" style="font-size:15px;">
                ← Back to Manage Categories
            </a>

            <h1 class="page-title">
                Edit Category
            </h1>

            <p class="page-subtitle">
                Update your category name or starting balance.
            </p>

        </div>

    </header>

    <form method="POST">

        <h2 style="margin-bottom:25px; font-family:'Cormorant Garamond',serif; font-size:40px;">
            Update Category
        </h2>

        <input
            type="text"
            name="name"
            placeholder="Category Name"
            value="{{ category.name }}"
            required
        >

        <input
            type="number"
            step="0.01"
            name="starting_balance"
            placeholder="Starting Balance"
            value="{{ category.starting_balance }}"
            required
        >

        <button type="submit">
            Save Changes
        </button>

    </form>

    <div style="margin-top:40px; text-align:center;">

        <form
            action="/delete-category/{{ category.id }}"
            method="POST"
            onsubmit="return confirm('Are you sure you want to delete this category? All transactions inside it will be deleted.');"
        >

            <button
                type="submit"
                style="
                    background:#b84040;
                    border:none;
                    padding:12px 18px;
                    border-radius:10px;
                    color:white;
                    font-weight:600;
                    cursor:pointer;
                "
            >
                🗑 Delete Category
            </button>

        </form>

    </div>

</div>

{% endblock %}
