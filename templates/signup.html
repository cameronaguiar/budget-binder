{% extends 'base.html' %}

{% block content %}

<h1>Create Account</h1>

<form action="/signup" method="post">

    <input
        type="email"
        name="email"
        placeholder="Email Address"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Create Account
    </button>

</form>

<p>
    Already have an account?
    <a href="/login">Log In</a>
</p>

{% endblock %}
