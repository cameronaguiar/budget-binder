{% extends 'base.html' %}

{% block content %}

<h1>Log In</h1>

<form action="/login" method="post">

    <input
        type="email"
        name="email"
        placeholder="Email Address"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Log In
    </button>

</form>

<p>
    Don't have an account?
    <a href="/signup">Create Account</a>
</p>

{% endblock %}
