{% extends 'base.html' %}

{% block content %}

<h1>Budget Binder</h1>

<p>
    <a href="/logout">Logout</a>
</p>

<form action="/create-account" method="post">

    <input
        name="name"
        placeholder="Account Name"
        required>

    <select name="currency" required>
        <option value="$">USD</option>
        <option value="€">EUR</option>
    </select>

    <button type="submit">
        Create
    </button>

</form>

<hr>

{% for account in accounts %}

<a
    class="card"
    href="/account/{{ account.id }}">

    <h2>{{ account.name }}</h2>

    <p>
        {{ account.currency }}
        {{ "%.2f"|format(account.total) }}
    </p>

</a>

{% else %}

<p>No accounts yet. Create your first one above.</p>

{% endfor %}

{% endblock %}
