<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        {% block title %}
            Budget Binder
        {% endblock %}

    </title>

    <!-- Google Fonts -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Main CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <!-- Browser Theme Color -->
    <meta
        name="theme-color"
        content="#8B6B4A">

    <!-- Favicon (optional) -->
    <!--
    <link
        rel="icon"
        href="{{ url_for('static', filename='images/favicon.png') }}">
    -->

</head>

<body>

    {% block content %}
    {% endblock %}

</body>

</html>
